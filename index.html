<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;800&family=Inter:wght@300&display=swap');

        body { background: #050505; color: #fff; font-family: 'Inter', sans-serif; margin: 0; overflow: hidden; }

        /* Background Animated Stars */
        .stars { position: fixed; inset: 0; z-index: -1; background: radial-gradient(white, transparent 1px); background-size: 50px 50px; opacity: 0.1; }

        .container { 
            height: 100vh; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; text-align: center;
        }

        h1 { font-family: 'Syne', sans-serif; font-size: 5rem; margin-bottom: 10px; }

        /* The Countdown */
        #countdown { 
            display: flex; gap: 30px; font-family: 'Syne', sans-serif; 
            font-size: 3rem; margin: 40px 0; color: #00f2fe; 
        }

        .gift-btn { 
            padding: 20px 50px; border: 1px solid white; background: transparent; 
            color: white; cursor: pointer; text-transform: uppercase; 
            letter-spacing: 4px; transition: 0.4s;
        }
        .gift-btn:hover { background: white; color: #000; }

        .note { margin-top: 40px; opacity: 0.5; font-size: 12px; letter-spacing: 2px; }
    </style>
</head>
<body>

    <div class="stars"></div>

    <div class="container">
        <h1 id="title">BIRTHDAY COUNTDOWN</h1>
        
        <div id="countdown">
            <div id="days">00</div>:
            <div id="hours">00</div>:
            <div id="mins">00</div>
        </div>

        <button class="gift-btn" onclick="openGift()">SEND GIFT</button>
        <p class="note">THE CELEBRATION IS NEAR // 2026</p>
    </div>

    <script>
        // Set the target date (e.g., your birthday)
        const target = new Date("July 15, 2026 00:00:00").getTime();

        setInterval(() => {
            const now = new Date().getTime();
            const diff = target - now;

            document.getElementById('days').innerText = Math.floor(diff / (1000 * 60 * 60 * 24));
            document.getElementById('hours').innerText = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            document.getElementById('mins').innerText = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
        }, 1000);

        function openGift() {
            alert("Digital invitation sent! Get ready for the 2026 archive.");
        }
    </script>
</body>
</html>
