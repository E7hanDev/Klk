<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;800&family=Inter:wght@300&display=swap');

        :root { --bg: #0a0a0a; --speckle: #1a1a1a; }
        body { 
            background-color: var(--bg);
            background-image: radial-gradient(var(--speckle) 1px, transparent 1px);
            background-size: 30px 30px;
            color: #fff; font-family: 'Inter', sans-serif;
        }

        /* Full Screen Hero with Vignette */
        .hero { 
            height: 100vh; width: 100vw; position: relative;
            background: radial-gradient(circle, rgba(0,0,0,0) 40%, rgba(0,0,0,1) 100%);
        }
        .hero-img { width: 100%; height: 100%; object-fit: cover; opacity: 0.7; }
        
        .logo-overlay { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            text-align: center; z-index: 10;
        }
        .logo-overlay h1 { font-family: 'Syne', sans-serif; font-size: 6rem; letter-spacing: -2px; }

        /* Catalogue */
        .catalogue { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 40px; padding: 80px; }
        .card { height: 500px; background: #000; overflow: hidden; position: relative; transition: 0.6s; }
        .card:hover { transform: translateY(-10px); }
        .card img { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.8); }
        
        .details { padding: 20px 0; }
        .btn { 
            margin-top: 15px; padding: 12px 25px; border: 1px solid #fff; 
            background: transparent; color: white; cursor: pointer;
            text-transform: uppercase; font-size: 11px; letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <!-- Full Screen Cover with Nonchalant Vignette -->
    <section class="hero">
        <img class="hero-img" src="https://images.unsplash.com/photo-1523381210434-271e8be1f52b?w=1600">
        <div class="logo-overlay">
            <h1 style="font-size: 1rem; letter-spacing: 10px; opacity: 0.6;">EST. 2026</h1>
            <h1>SECRET FINDS</h1>
        </div>
    </section>

    <!-- Catalogue -->
    <div class="catalogue">
        <div class="card">
            <img src="https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?w=500">
            <div class="details">
                <p>OVERSIZED ESSENTIAL</p>
                <button class="btn">View Selection</button>
            </div>
        </div>
        <div class="card">
            <img src="https://images.unsplash.com/photo-1556821840-3a63f95609a7?w=500">
            <div class="details">
                <p>ARCHIVE HOODIE</p>
                <button class="btn">View Selection</button>
            </div>
        </div>
        <div class="card">
            <img src="https://images.unsplash.com/photo-1502716119720-b23a9375fe1d?w=500">
            <div class="details">
                <p>TECH-WEAR SHELL</p>
                <button class="btn">View Selection</button>
            </div>
        </div>
    </div>

</body>
</html>
