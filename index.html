<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;800&family=Inter:wght@300&display=swap');

        :root { --bg: #0a0a0a; --speckle: #1a1a1a; }
        body { background: var(--bg); background-image: radial-gradient(#1a1a1a 1px, transparent 1px); background-size: 30px 30px; color: #fff; font-family: 'Inter', sans-serif; overflow-x: hidden; }

        .snap-container { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; }
        .snap-section { height: 100vh; scroll-snap-align: start; position: relative; display: flex; align-items: center; justify-content: center; }

        .hero { position: relative; background: #000; }
        .hero-img { width: 100%; height: 100%; object-fit: cover; opacity: 0.5; transition: 1.5s; }
        .fade-out { position: absolute; bottom: 0; width: 100%; height: 40%; background: linear-gradient(transparent, #0a0a0a); }
        .hero-text { position: absolute; font-family: 'Syne', serif; font-size: 2.5rem; text-align: center; max-width: 800px; opacity: 0; transition: 1.5s; }

        .catalogue { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 40px; padding: 100px; }
        .card { height: 500px; background: rgba(255,255,255,0.03); border-radius: 40px; transition: 0.6s; animation: float 6s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
        .card:hover { transform: translateY(-30px) scale(1.05); box-shadow: 0 30px 60px rgba(255,255,255,0.1); }
        .card img { width: 100%; height: 80%; object-fit: cover; border-radius: 30px; }
        
        .btn { padding: 10px 25px; border: 1px solid #fff; background: transparent; color: white; cursor: pointer; text-transform: uppercase; font-size: 10px; border-radius: 20px; }
    </style>
</head>
<body class="snap-container">

    <section class="snap-section hero">
        <!-- Changed to a model wearing high-end local-style streetwear -->
        <img id="hImg" class="hero-img" src="https://images.unsplash.com/photo-1617137968427-85924c800a22?w=1600">
        <div class="fade-out"></div>
        <div id="hText" class="hero-text">Dress with style, even when the prices are high. Proudly Malawian-made, defining the next wave of urban luxury.</div>
    </section>

    <div class="catalogue">
        <script>
            // Curated photos that match the Malawian urban aesthetic (Streetwear/Layering)
            const collection = [
                {name: "Chitenge-Accented Tee", img: "https://images.unsplash.com/photo-1620799140408-edc6dcb6d633?w=500"},
                {name: "Urban Cargo Fit", img: "https://images.unsplash.com/photo-1594938298603-c8148c4dae35?w=500"},
                {name: "Malawi Archive Hoodie", img: "https://images.unsplash.com/photo-1556821840-3a63f95609a7?w=500"},
                {name: "Vibrant Pattern Shell", img: "https://images.unsplash.com/photo-1617137968427-85924c800a22?w=500"},
                {name: "Street-Ready Denim", img: "https://images.unsplash.com/photo-1542272604-787c3835535d?w=500"},
                {name: "Minimalist Executive", img: "https://images.unsplash.com/photo-1507679799987-c73779587ccf?w=500"},
                {name: "Sunset Layering", img: "https://images.unsplash.com/photo-1539109136881-3be0616acf4b?w=500"},
                {name: "Modern Traditionalist", img: "https://images.unsplash.com/photo-1524532797701-83161099b6d3?w=500"},
                {name: "Urban Explorer Jacket", img: "https://images.unsplash.com/photo-1591047139829-d91aecb6caea?w=500"},
                {name: "Signature Street Set", img: "https://images.unsplash.com/photo-1548883354-94bcfe327f09?w=500"}
            ];
            
            collection.forEach((item) => {
                document.write(`
                    <div class="card">
                        <img src="${item.img}">
                        <div style="text-align:center; padding:20px;">
                            <p style="margin-bottom:10px;">${item.name}</p>
                            <button class="btn">Message To Order</button>
                        </div>
                    </div>
                `);
            });
        </script>
    </div>

    <script>
        window.addEventListener('scroll', () => {
            const scroll = window.scrollY;
            document.getElementById('hImg').style.opacity = Math.max(0, 0.5 - scroll / 400);
            document.getElementById('hText').style.opacity = Math.min(1, (scroll - 100) / 300);
        });
    </script>
</body>
</html>
