<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;600&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { 
            background: radial-gradient(circle at top right, #1a1a1a, #000);
            color: white;
            min-height: 100vh;
            padding: 40px;
        }

        /* The Logo */
        .header { text-align: center; margin-bottom: 60px; }
        .logo { font-size: 3rem; font-weight: 800; letter-spacing: -2px; color: #fff; }
        
        /* Glassmorphism Product Card */
        .container { display: flex; flex-direction: column; align-items: center; gap: 40px; }
        .card { 
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            padding: 20px;
            width: 100%; max-width: 450px;
            transition: transform 0.3s ease;
        }
        .card:hover { transform: scale(1.02); }
        .card img { width: 100%; border-radius: 20px; height: 300px; object-fit: cover; }
        
        /* Royal Buttons */
        .btn { 
            width: 100%; padding: 18px; border-radius: 15px; border: none;
            background: linear-gradient(135deg, #d4af37, #aa8c2c); /* Gold gradient */
            color: black; font-weight: 600; cursor: pointer; margin-top: 15px;
            text-transform: uppercase; letter-spacing: 1px;
        }

        .footer { text-align: center; margin-top: 80px; color: #666; font-size: 0.8rem; }
    </style>
</head>
<body>

<div class="header">
    <div class="logo">T's SHOP</div>
    <p>PREMIUM APPAREL</p>
</div>

<div class="container">
    <div class="card">
        <img src="https://images.unsplash.com/photo-1523381210434-271e8be1f52b?auto=format&fit=crop&q=80&w=800" alt="Hoodie">
        <h2 style="margin: 20px 0 10px;">SIGNATURE HOODIE</h2>
        <p style="color: #aaa;">$95.00</p>
        <button class="btn" onclick="window.location.href='mailto:your-email@example.com?subject=Order: Signature Hoodie'">Purchase</button>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1554568218-0f1715e72254?auto=format&fit=crop&q=80&w=800" alt="Tee">
        <h2 style="margin: 20px 0 10px;">CLASSIC VINTAGE TEE</h2>
        <p style="color: #aaa;">$45.00</p>
        <button class="btn" onclick="window.location.href='mailto:your-email@example.com?subject=Order: Vintage Tee'">Purchase</button>
    </div>
</div>

<div class="footer">
    <p>Privacy Policy | Terms of Service</p>
    <p style="margin-top: 10px;">MESSAGE US TO FINALIZE ORDERS</p>
</div>

</body>
</html>
