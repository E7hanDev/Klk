<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Mono&family=Inter:wght@300;600&display=swap');
        
        body { background: #050505; color: #fff; font-family: 'Inter', sans-serif; display: flex; justify-content: center; padding: 40px; }
        .app-container { width: 100%; max-width: 600px; }
        
        .card { background: rgba(255,255,255,0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.05); padding: 30px; border-radius: 30px; margin-bottom: 20px; }
        
        input, textarea { width: 100%; background: #000; border: 1px solid #333; color: #fff; padding: 15px; border-radius: 15px; margin-top: 10px; font-family: 'Space Mono'; box-sizing: border-box; }
        
        .btn { width: 100%; padding: 15px; background: #fff; color: #000; border: none; border-radius: 15px; font-weight: 800; cursor: pointer; margin-top: 15px; text-transform: uppercase; }
        
        .item { padding: 15px; border-bottom: 1px solid #222; display: flex; justify-content: space-between; font-family: 'Space Mono'; font-size: 14px; }
    </style>
</head>
<body>

    <div class="app-container">
        <!-- Input Section -->
        <div class="card">
            <h2 style="font-family: 'Space Mono';">// INFINITY_NOTES</h2>
            <input id="noteInput" placeholder="WHAT IS ON YOUR MIND?">
            <button class="btn" onclick="addNote()">SAVE TO ARCHIVE</button>
        </div>

        <!-- List Section -->
        <div class="card" id="noteList"></div>
    </div>

    <script>
        // Load notes from local storage on start
        function loadNotes() {
            const list = document.getElementById('noteList');
            const notes = JSON.parse(localStorage.getItem('infinityNotes')) || [];
            list.innerHTML = notes.map(n => `<div class="item"><span>${n}</span> <span style="color:#666" onclick="deleteNote('${n}')">X</span></div>`).join('');
        }

        function addNote() {
            const input = document.getElementById('noteInput');
            if(!input.value) return;
            const notes = JSON.parse(localStorage.getItem('infinityNotes')) || [];
            notes.push(input.value);
            localStorage.setItem('infinityNotes', JSON.stringify(notes));
            input.value = '';
            loadNotes();
        }

        function deleteNote(note) {
            let notes = JSON.parse(localStorage.getItem('infinityNotes'));
            notes = notes.filter(n => n !== note);
            localStorage.setItem('infinityNotes', JSON.stringify(notes));
            loadNotes();
        }

        loadNotes();
    </script>
</body>
</html>
