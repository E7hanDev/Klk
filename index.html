<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Inter:wght@300;400&display=swap');

        /* Professional Cream/Sand Palette */
        :root { --bg: #f4f1ea; --accent: #8b7355; --text: #2d2d2d; }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; overflow-x: hidden; }

        /* Smooth Vertical Snap Scrolling */
        .snap-container { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; }
        .snap-section { height: 100vh; scroll-snap-align: start; display: flex; align-items: center; justify-content: center; position: relative; }

        /* The Hoodie-to-Text Fade Effect */
        .hero-img { width: 400px; transition: opacity 1.5s ease-out; }
        .hero-text { font-family: 'Playfair Display', serif; font-size: 3rem; position: absolute; opacity: 0; transition: opacity 1.5s ease-out; }

        /* Enlargement on Hover */
        .product-card { width: 300px; transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1); cursor: pointer; }
        .product-card:hover { transform: scale(1.15); }

        .btn { padding: 15px 40px; border: 1px solid var(--accent); color: var(--accent); text-transform: uppercase; margin-top: 20px; cursor: pointer; }
    </style>
</head>
<body class="snap-container">

    <!-- Hero Section -->
    <section class="snap-section" onscroll="handleFade()">
        <img id="fadeImg" class="hero-img" src="https://images.unsplash.com/photo-1556821840-3a63f95609a7?w=800">
        <h1 id="fadeText" class="hero-text">
            Dress with style, even when the craft comes at a premium; true elegance is an investment that transcends the standard.
        </h1>
    </section>

    <!-- Product Collection -->
    <section class="snap-section" style="flex-direction: column; gap: 50px;">
        <div style="display: flex; gap: 40px;">
            <img class="product-card" src="https://images.unsplash.com/photo-1523381210434-271e8be1f52b?w=500">
            <img class="product-card" src="https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?w=500">
        </div>
        <button class="btn">Message Us to Finalize Order</button>
    </section>

    <script>
        // Scroll Logic for Fade Effect
        window.addEventListener('scroll', () => {
            const img = document.getElementById('fadeImg');
            const text = document.getElementById('fadeText');
            const scrollY = window.scrollY;
            
            img.style.opacity = Math.max(0, 1 - scrollY / 300);
            text.style.opacity = Math.min(1, (scrollY - 100) / 300);
        });
    </script>
</body>
</html>
