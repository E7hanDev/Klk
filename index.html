<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;600;800&display=swap');

        body { 
            margin: 0; background: #050505; color: #fff; 
            font-family: 'Inter', sans-serif;
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh;
        }

        /* Ambient Glow Background */
        .glow {
            position: fixed; width: 300px; height: 300px; 
            background: rgba(0, 242, 254, 0.15); filter: blur(100px); border-radius: 50%;
        }

        .container { 
            width: 90%; max-width: 400px; text-align: center; z-index: 1;
        }

        .profile-pic { 
            width: 120px; height: 120px; border-radius: 50%; 
            background: #222; border: 2px solid rgba(255,255,255,0.1);
            margin-bottom: 20px; object-fit: cover;
        }

        h2 { font-weight: 800; letter-spacing: -1px; margin-bottom: 5px; }
        p { color: #888; font-size: 14px; margin-bottom: 30px; }

        .divider { 
            font-size: 10px; text-transform: uppercase; letter-spacing: 4px;
            color: #444; margin: 40px 0 20px 0;
        }

        /* Aesthetic Buttons */
        .btn-link {
            display: block; width: 100%; padding: 18px; margin-bottom: 15px;
            background: rgba(255,255,255,0.03); backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 16px;
            color: #fff; text-decoration: none; font-weight: 600; font-size: 14px;
            transition: 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .btn-link:hover { 
            background: #fff; color: #000; transform: translateY(-5px);
        }
    </style>
</head>
<body>

    <div class="glow"></div>

    <div class="container">
        <img src="https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?w=200" class="profile-pic">
        <h2>YOUR NAME</h2>
        <p>Digital Creator // Architect of the Future</p>

        <a href="#" class="btn-link">WATCH LATEST VIDEO</a>
        
        <div class="divider">Connect with us elsewhere</div>

        <a href="#" class="btn-link">INSTAGRAM</a>
        <a href="#" class="btn-link">TIKTOK</a>
        <a href="#" class="btn-link">YOUTUBE</a>
    </div>

</body>
</html>
