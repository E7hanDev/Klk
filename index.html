<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;800&family=Inter:wght@300;600&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #050505; color: #fff; font-family: 'Inter', sans-serif; overflow-x: hidden; }

        /* Full Screen Immersive Background */
        .bg-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(120deg, #0f0f0f 0%, #1a1a1a 100%);
            z-index: -1;
        }

        /* Hero Section */
        .hero { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .hero h1 { font-family: 'Syne', sans-serif; font-size: 8vw; text-transform: uppercase; margin-bottom: 20px; letter-spacing: -2px; }

        /* Product Grid */
        .shop-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); gap: 40px; padding: 80px; }
        .product-card { position: relative; height: 600px; border-radius: 10px; overflow: hidden; background: #111; }
        .product-card img { width: 100%; height: 100%; object-fit: cover; transition: 0.7s cubic-bezier(0.16, 1, 0.3, 1); filter: grayscale(50%); }
        .product-card:hover img { transform: scale(1.05); filter: grayscale(0%); }

        /* Premium Animation Button */
        .btn-wrapper { position: absolute; bottom: 40px; left: 40px; }
        .btn-premium { 
            padding: 20px 40px; background: transparent; border: 1px solid rgba(255,255,255,0.3);
            color: #fff; cursor: pointer; transition: 0.5s; text-transform: uppercase; letter-spacing: 2px;
            overflow: hidden; position: relative;
        }
        .btn-premium:hover { border-color: #fff; background: #fff; color: #000; transform: scale(1.05); }

        /* Privacy Policy Section */
        .footer { padding: 80px; text-align: center; border-top: 1px solid #222; margin-top: 40px; }
    </style>
</head>
<body>

<div class="bg-overlay"></div>

<section class="hero">
    <p style="letter-spacing: 5px; opacity: 0.6;">COLLECTION // 2026</p>
    <h1>T'S SHOP</h1>
</section>

<div class="shop-container">
    <!-- Item 1 -->
    <div class="product-card">
        <img src="https://images.unsplash.com/photo-1523381210434-271e8be1f52b?q=80&w=1200">
        <div class="btn-wrapper">
            <button class="btn-premium" onclick="alert('DM to order')">Signature Hoodie // $95</button>
        </div>
    </div>
    <!-- Item 2 -->
    <div class="product-card">
        <img src="https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?q=80&w=1200">
        <div class="btn-wrapper">
            <button class="btn-premium" onclick="alert('DM to order')">Essential Tee // $45</button>
        </div>
    </div>
</div>

<div class="footer">
    <p>PRIVACY POLICY | TERMS OF SERVICE | SHIPPING</p>
    <p style="margin-top: 20px; font-size: 10px; color: #444;">T'S SHOP © 2026 // DM TO SECURE PIECES</p>
</div>

</body>
</html>
